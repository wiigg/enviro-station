name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - name: Test backend
        working-directory: backend
        run: go test ./...

  dashboard-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard-v2/package-lock.json

      - name: Install dashboard-v2 dependencies
        working-directory: dashboard-v2
        run: npm ci

      - name: Lint dashboard-v2
        working-directory: dashboard-v2
        run: npm run lint

      - name: Test dashboard-v2
        working-directory: dashboard-v2
        run: npm test

      - name: Build dashboard-v2
        working-directory: dashboard-v2
        run: npm run build

  device:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check device modules
        working-directory: device
        run: python -m compileall -q .
